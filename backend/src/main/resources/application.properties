# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weekly_report_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gihansanjaya}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
app.jwt.secret=${JWT_SECRET:WeeklyReportGeneratorSuperSecretKeyThatIsVeryLongAndSecure1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI configurations
app.gemini.api-key=${GEMINI_API_KEY:}

# Google OAuth Configuration
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}

# Spring Mail (SMTP) Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_GMAIL:${SMTP_USERNAME:gsgamage4@gmail.com}}
spring.mail.password=${SMTP_APP_PASSWORD:${SMTP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
