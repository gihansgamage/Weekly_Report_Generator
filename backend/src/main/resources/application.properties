# Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/weekly_report_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:gihansanjaya}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configurations
app.jwt.secret=${JWT_SECRET:WeeklyReportGeneratorSuperSecretKeyThatIsVeryLongAndSecure1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# AI configurations
app.gemini.api-key=${GEMINI_API_KEY:}
